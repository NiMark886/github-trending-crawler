version: '3.8'

services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-trending-crawler
    volumes:
      # Mount data directories for persistence
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./charts:/app/charts
      # Mount config file if exists
      - ./config.json:/app/config.json:ro
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    restart: unless-stopped
    networks:
      - crawler-net

  # Optional: Run scheduled crawling
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-trending-scheduler
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "Running scheduled crawl..."
          python cli.py crawl --since daily -o /app/data/daily_$(date +%Y%m%d).json
          python cli.py crawl --since weekly -o /app/data/weekly_$(date +%Y%m%d).json
          echo "Sleeping for 24 hours..."
          sleep 86400
        done
    restart: unless-stopped
    networks:
      - crawler-net

networks:
  crawler-net:
    driver: bridge
